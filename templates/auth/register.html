<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Create Account - Generic Poker Platform</title>
    <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/auth.css') }}">
</head>
<body class="auth-page">
    <div class="auth-card">
        <h1>&spades; Create Account</h1>
        <p class="auth-subtitle">Join the table in under a minute</p>

        {% with messages = get_flashed_messages(with_categories=true) %}
            {% for category, message in messages %}
                <div class="flash-message {{ category }}">{{ message }}</div>
            {% endfor %}
        {% endwith %}

        <form method="post">
            <label for="username">Username</label>
            <input type="text" id="username" name="username" autocomplete="username"
                   value="{{ username or '' }}" required autofocus>
            <label for="email">Email</label>
            <input type="email" id="email" name="email" autocomplete="email"
                   value="{{ email or '' }}" required>
            <label for="password">Password</label>
            <input type="password" id="password" name="password" autocomplete="new-password" required>
            <label for="confirm_password">Confirm password</label>
            <input type="password" id="confirm_password" name="confirm_password" autocomplete="new-password" required>
            <button type="submit">Create Account</button>
        </form>

        <p class="auth-alt-link">Already have an account? <a href="{{ url_for('auth.login') }}">Login here</a></p>
    </div>
</body>
</html>
